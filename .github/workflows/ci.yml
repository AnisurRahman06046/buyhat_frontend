name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "buyhat_frontend/**"
  pull_request:
    paths:
      - "buyhat_frontend/**"

defaults:
  run:
    working-directory: buyhat_frontend

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: buyhat_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_SITE_NAME: BuyHat
          BACKEND_API_URL: http://localhost:3000/api/v1
